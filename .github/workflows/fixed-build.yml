name: Fixed Build

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      # 设置百度地图API密钥（需要你在仓库Secrets中设置）
      MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
      MAPS_SAFE_CODE: ${{ secrets.MAPS_SAFE_CODE }}
    
    steps:
    # 1. 下载代码
    - uses: actions/checkout@v4
    
    # 2. 创建local.properties
    - name: Create local.properties
      run: |
        echo "MAPS_API_KEY=$MAPS_API_KEY" >> local.properties
        echo "MAPS_SAFE_CODE=$MAPS_SAFE_CODE" >> local.properties
    
    # 3. 创建调试密钥
    - name: Create debug keystore
      run: |
        keytool -genkeypair \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US" \
          -keystore debug.keystore \
          -storepass android \
          -keypass android
        mkdir -p keystore
        mv debug.keystore keystore/GoGoGo.jks
    
    # 4. 设置Java环境
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    # 5. 设置Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    # 6. 接受SDK许可证
    - name: Accept Android Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
    
    # 7. 给gradlew执行权限
    - name: Grant execute permission
      run: chmod +x ./gradlew
    
    # 8. 修改gradle配置（临时修复）
    - name: Fix gradle configuration
      run: |
        # 备份原文件
        cp app/build.gradle app/build.gradle.backup
        # 移除签名配置（临时方案）
        sed -i '/signingConfigs {/,/^}/d' app/build.gradle
        sed -i '/signingConfig = signingConfigs.release/d' app/build.gradle
    
    # 9. 构建Debug APK
    - name: Build Debug APK
      run: |
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace --info
    
    # 10. 上传APK
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: gogogo-debug
        path: app/build/outputs/apk/debug/*.apk
    
    # 11. 上传构建日志（失败时）
    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build.gradle.backup
          **/*.log
